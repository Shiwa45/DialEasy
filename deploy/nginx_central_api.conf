# deploy/nginx_central_api.conf
# ─────────────────────────────────────────────────────────────────────────────
# Nginx configuration for the centralised mobile API domain.
#
# Place this file at: /etc/nginx/sites-available/dialeasy_api
# Enable with:        sudo ln -s /etc/nginx/sites-available/dialeasy_api \
#                                /etc/nginx/sites-enabled/dialeasy_api
# Reload:             sudo systemctl reload nginx
#
# Prerequisites:
#   1. Gunicorn is running (see deploy/gunicorn.service)
#   2. SSL cert exists (run deploy/ssl_setup.sh first)
# ─────────────────────────────────────────────────────────────────────────────

# ── Upstream: Gunicorn ────────────────────────────────────────────────────────
# If you already have a Gunicorn upstream defined in your existing Nginx config,
# reuse it here — don't define it twice.
upstream dialeasy_gunicorn {
    server unix:/run/gunicorn/dialeasy.sock fail_timeout=0;
    # OR if using TCP socket:
    # server 127.0.0.1:8000 fail_timeout=0;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.dialeasy.easyian.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — Centralised API ───────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.dialeasy.easyian.com;

    # ── SSL ───────────────────────────────────────────────────────────────────
    # Single cert for this domain — no wildcard needed.
    ssl_certificate     /etc/letsencrypt/live/api.dialeasy.easyian.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.dialeasy.easyian.com/privkey.pem;

    # Modern SSL settings (Mozilla Intermediate config)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;

    # ── CORS Preflight (handled at Nginx level for speed) ─────────────────────
    # Django corsheaders handles the actual CORS logic, but we short-circuit
    # OPTIONS preflight here so it never hits Gunicorn.
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin  "$http_origin"                          always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Tenant-Slug, X-Requested-With" always;
        add_header Access-Control-Max-Age       86400                                   always;
        add_header Content-Length               0;
        return 204;
    }

    # ── Client max body size (for file uploads) ───────────────────────────────
    client_max_body_size 25M;

    # ── Static files (served directly by Nginx, skips Gunicorn) ──────────────
    location /static/ {
        alias /home/ubuntu/dialeasy/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/ubuntu/dialeasy/media/;
        expires 7d;
    }

    # ── Health check (no logging to reduce noise) ─────────────────────────────
    location = /mobile/health/ {
        access_log off;
        proxy_pass http://dialeasy_gunicorn;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Main API proxy ────────────────────────────────────────────────────────
    location / {
        proxy_pass http://dialeasy_gunicorn;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward custom tenant header to Django
        proxy_set_header X-Tenant-Slug     $http_x_tenant_slug;

        # Timeouts (generous for long-running AI / report endpoints)
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Buffer settings
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      16 8k;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/dialeasy_api_access.log combined;
    error_log  /var/log/nginx/dialeasy_api_error.log warn;
}
