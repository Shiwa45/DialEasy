include: package:flutter_lints/flutter.yaml

linter:
  rules:
    # Style
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
    prefer_final_fields: true
    prefer_final_locals: false        # too noisy during development
    always_declare_return_types: true
    sort_child_properties_last: true

    # Safety
    avoid_print: true
    cancel_subscriptions: true
    close_sinks: true
    avoid_dynamic_calls: false        # too restrictive for API data parsing
    avoid_catches_without_on_clauses: false

    # Readability
    directives_ordering: true
    lines_longer_than_80_chars: false # allow long UI widget chains
    require_trailing_commas: true

analyzer:
  errors:
    # Downgrade to warnings during development
    invalid_annotation_target: ignore
    missing_return: warning
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - lib/generated/**
