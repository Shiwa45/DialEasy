name: telecrm_app
description: TeleCRM - Auto-dialing CRM for telecallers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Phone / Calling
  flutter_phone_direct_caller: ^2.2.1
  phone_state: ^1.0.0
  permission_handler: ^11.3.0
  url_launcher: ^6.2.4

  # UI & Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  fl_chart: ^0.67.0
  dotted_border: ^2.1.0
  glassmorphism: ^3.0.0
  animated_text_kit: ^4.2.2
  flutter_slidable: ^3.1.0
  badges: ^3.1.2

  # Date & Time
  intl: ^0.19.0
  jiffy: ^6.3.1

  # Notifications
  flutter_local_notifications: ^17.2.1+2
  timezone: ^0.9.4

  # Connectivity
  connectivity_plus: ^6.0.3

  # Utils
  equatable: ^2.0.5
  uuid: ^4.3.3
  logger: ^2.3.0
  package_info_plus: ^8.0.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"
  adaptive_icon_background: "#101820"
  adaptive_icon_foreground: "assets/icons/icon.png"

dependency_overrides:
  phone_state:
    path: ./phone_state_local

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/animations/

