<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — DialEasy CRM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --brand-orange: #F97316;
      --brand-orange-light: #FFF7ED;
      --brand-green: #16A34A;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #F1F5F9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-wrapper {
      width: 100%;
      max-width: 440px;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px;
      border: 1px solid #E2E8F0;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 52px; height: 52px;
      background: var(--brand-orange);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 800; color: #fff;
      margin: 0 auto 12px;
    }

    .login-title { font-size: 22px; font-weight: 800; color: #0F172A; margin-bottom: 4px; }
    .login-sub   { font-size: 13px; color: #64748B; }

    .form-label {
      font-size: 12px;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .form-control {
      border-radius: 10px;
      border: 1px solid #E2E8F0;
      font-family: inherit;
      font-size: 14px;
      padding: 10px 14px;
      color: #0F172A;
    }

    .form-control:focus {
      border-color: var(--brand-orange);
      box-shadow: 0 0 0 3px rgba(249,115,22,0.12);
    }

    .btn-login {
      width: 100%;
      background: var(--brand-orange);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover { background: #C2410C; }

    .input-group-text {
      background: #F8FAFC;
      border: 1px solid #E2E8F0;
      border-right: none;
      color: #94A3B8;
      border-radius: 10px 0 0 10px;
    }

    .input-group .form-control { border-left: none; border-radius: 0 10px 10px 0; }

    .login-footer { text-align: center; margin-top: 24px; font-size: 12px; color: #94A3B8; }

    .errorlist { list-style: none; padding: 0; margin: 0 0 12px; }
    .errorlist li {
      background: #FEF2F2;
      color: #B91C1C;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">D</div>
        <div class="login-title">DialEasy CRM</div>
        <div class="login-sub">Sign in to your workspace</div>
      </div>

      {% if form.errors %}
      <ul class="errorlist">
        <li><i class="bi bi-exclamation-circle-fill"></i> Invalid username or password.</li>
      </ul>
      {% endif %}

      {% if messages %}
      {% for msg in messages %}
      <div style="background:#FEF9C3;color:#854D0E;border-radius:8px;padding:9px 14px;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:7px;">
        <i class="bi bi-info-circle-fill"></i> {{ msg }}
      </div>
      {% endfor %}
      {% endif %}

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label" for="id_username">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" id="id_username" class="form-control"
              placeholder="Enter your username" autofocus required
              value="{{ form.username.value|default:'' }}">
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label" for="id_password">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" id="id_password" class="form-control"
              placeholder="Enter your password" required>
          </div>
        </div>

        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn-login">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
      </form>
    </div>

    <div class="login-footer">
      &copy; {% now "Y" %} DialEasy · Powered by Easyian
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
